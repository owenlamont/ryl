name: Install lychee
description: >-
  Install a pinned, checksum-verified lychee binary onto PATH (Linux x86_64 runners).
  Single bump point for the link checker used by ci.yml; lychee is not in
  taiki-e/install-action, so we fetch the upstream release binary directly.

runs:
  using: composite
  steps:
    - name: Install lychee
      shell: bash
      env:
        # Bump together with the SHA256 (read from `<asset>.sha256` on the release).
        LYCHEE_VERSION: v0.24.2
        LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
      run: |-
        set -euo pipefail
        asset="lychee-x86_64-unknown-linux-gnu.tar.gz"
        # The archive nests the binary under a target-triple dir, not at the root.
        dir="${asset%.tar.gz}"
        url="https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/${asset}"
        curl --fail --silent --show-error --location "$url" -o "$asset"
        echo "${LYCHEE_SHA256}  ${asset}" | sha256sum --check
        tar -xzf "$asset" "$dir/lychee"
        sudo install -m 0755 "$dir/lychee" /usr/local/bin/lychee
        rm -rf "$asset" "$dir"
        lychee --version
