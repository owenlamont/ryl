name: Update Linters
on:
  schedule:
    - cron: '30 8 * * 6'  # Saturday 18:00 UTC+9:30
  workflow_dispatch:

jobs:
  refresh-prek-config:
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Install prek
        run: uv tool install prek --force

      - name: Run prek autoupdate
        run: prek autoupdate

      - name: Check for changes in prek.toml
        id: check_diff
        run: |
          if git diff --quiet -- prek.toml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate token
        if: steps.check_diff.outputs.changed == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        id: generate-token
        with:
          app-id: ${{ secrets.AUTH_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}

      - name: Create PR with updated prek.toml
        if: steps.check_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore: refresh prek.toml"
          title: "chore: refresh prek.toml"
          body: |
            This PR updates `prek.toml` by running `prek autoupdate`.
            It was triggered automatically (or manually) to keep linters up-to-date.
          branch: bot/prek-config-refresh
          author: GitHub Actions <actions@github.com>
          delete-branch: true
