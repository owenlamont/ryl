name: Update Dependencies and Linters
on:
  schedule:
    - cron: '30 8 * * 0'  # Sunday 18:00 UTC+9:30
  workflow_dispatch:

jobs:
  refresh-dependencies-and-linters:
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: write
      pull-requests: write
    env:
      UV_PYTHON: 3.14
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Update Rust dependencies
        run: cargo update

      - name: Upgrade Python dependencies
        run: uv lock --upgrade

      - name: Install prek
        run: uv tool install prek

      - name: Run prek autoupdate
        run: prek autoupdate --cooldown-days 7

      - name: Pin GitHub Actions
        uses: suzuki-shunsuke/pinact-action@a60b07ee63e41654915780a3297ff9f5f6b6db63 # v0.1.0
        with:
          args: run -u --min-age 7

      - name: Check for changes
        id: check_diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate token
        if: steps.check_diff.outputs.changed == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        id: generate-token
        with:
          app-id: ${{ secrets.AUTH_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}

      - name: Create PR with updated deps and linters
        if: steps.check_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore: refresh dependencies and linters"
          title: "chore: refresh dependencies and linters"
          body: |
            Automated dependency and linter refresh:
            - Ran `cargo update`
            - Ran `uv lock --upgrade`
            - Ran `prek autoupdate --cooldown-days 7`
            - Ran `pinact run -u --min-age 7`
          branch: bot/update-deps-and-linters
          author: GitHub Actions <actions@github.com>
          delete-branch: true
