name: Dispatch Smoke Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version payload to send to ryl-pre-commit"
        required: true
        default: "0.3.6"

permissions:
  contents: read

jobs:
  dispatch-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for cross-repository dispatch
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.AUTH_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}
          owner: owenlamont
          repositories: ryl-pre-commit

      - name: Send test repository_dispatch to ryl-pre-commit
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            https://api.github.com/repos/owenlamont/ryl-pre-commit/dispatches \
            -d "{\"event_type\":\"pypi_release\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
          echo "Dispatch sent for version ${VERSION}"
