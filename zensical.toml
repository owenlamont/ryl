[project]
site_name = "ryl"
site_description = "A fast YAML linter, written in Rust"
site_author = "Owen Lamont"
site_url = "https://ryl-docs.pages.dev/"
copyright = """
Copyright &copy; 2025-2026 Owen Lamont
"""

repo_url = "https://github.com/owenlamont/ryl"
edit_uri = "blob/main/docs/"
repo_name = "owenlamont/ryl"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Shell completions" = "getting-started/shell-completions.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
    { "Using ryl with AI agents" = "using-ryl-with-ai-agents.md" },
    { "Migrating from yamllint" = "getting-started/migrating-from-yamllint.md" },
  ]},
  { "Rules" = "rules.md" },
  { "Configuration" = [
    { "Presets" = "config-presets.md" },
    { "Inline directives" = "directives.md" },
    { "Per-line ignores" = "per-line-ignores.md" },
    { "YAML in Markdown" = "markdown.md" },
    { "Using ryl with a formatter" = "using-with-formatters.md" },
  ]},
  { "Output formats" = "output-formats.md" },
  { "Editor integration" = "editor-integration.md" },
  { "YAML version compatibility" = "yaml-version.md" },
]

[project.theme]
language = "en"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/braces"
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/owenlamont/ryl"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/ryl/"

[[project.extra.social]]
icon = "fontawesome/brands/rust"
link = "https://crates.io/crates/ryl"

[[project.extra.social]]
icon = "fontawesome/brands/npm"
link = "https://www.npmjs.com/package/@owenlamont/ryl"

[[project.extra.social]]
icon = "simple/condaforge"
link = "https://anaconda.org/conda-forge/ryl"

[[project.extra.social]]
icon = "fontawesome/brands/windows"
link = "https://winstall.app/apps/owenlamont.ryl"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
