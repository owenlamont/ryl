# Fenced YAML in the rules docs is example content, not links.
include_verbatim = false

# Generated files carrying only external absolutized URLs: checking them adds network
# churn (and self-links can 404 between a docs change and its deploy) for no extra coverage.
exclude_path = ['(^|[\\/])llms(-full)?\.txt$']

max_retries = 5
retry_wait_time = 2
timeout = 30
# The default 128 concurrent requests is rude to rate-limited hosts (GitHub, Cloudflare).
max_concurrency = 16

# 429 (rate-limited) is reachable, not rot. 403 is deliberately NOT accepted so a link
# that rots into a hard 403 is still caught; auth-walled hosts are excluded by host below.
accept = ["200..=299", "429"]

exclude = [
  # base64 URL fragment is an SPA route, not a navigable page.
  '^https://play\.yaml\.com/#',
  # Auth-walled: 403s/redirects bots to login, so it is not link-checkable.
  '^https://chatgpt\.com/',
  # Loopback/preview hosts in doc examples (boundary-anchored so it does not match
  # hosts like localhost.example.com).
  '^https?://(localhost|127\.0\.0\.1|0\.0\.0\.0)([:/]|$)',
]
