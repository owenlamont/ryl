# Configuration for lychee (https://lychee.cli.rs), the documentation link checker, used by
# the prek `lychee` hook (run locally and in CI; auto-discovered from the repo root).
#
# The hook runs one online pass that checks internal heading anchors, relative links, and
# external URLs across the docs. External checks hit the network, so the retry/timeout/accept
# settings below smooth over transient flakiness. `include_fragments` is global (anchors on
# external pages would be checked too, a false-positive source on JS-rendered pages), but the
# docs currently carry no external `#fragment` links, so it only validates internal anchors;
# add an exclude here if that changes.

# The rules docs embed example YAML in fenced blocks; never treat their contents as links.
include_verbatim = false

# `docs/llms.txt` / `docs/llms-full.txt` are generated by gen_llms_txt.py (drift-guarded by
# its own prek hook) and carry only external, absolutized URLs, so checking them adds network
# churn (and self-links can 404 between a docs change and its deploy) with no extra coverage.
exclude_path = ['(^|[\\/])llms(-full)?\.txt$']

# --- Online-only resilience (no effect under `--offline`) ---

# Retry transient network blips before declaring a link dead. Generous because this is a
# blocking check: a flaky host should be retried, not fail the run on the first hiccup.
max_retries = 5
retry_wait_time = 2
timeout = 30
# The default 128 concurrent requests is rude to rate-limited hosts (GitHub, Cloudflare).
max_concurrency = 16

# Treat rate-limited responses as reachable rather than broken (transient, not rot).
# 403 is deliberately NOT accepted so a link that rots into a hard 403 is still caught;
# the one auth-walled host we reference is excluded by host below instead.
accept = ["200..=299", "429"]

exclude = [
  # play.yaml.com encodes editor state in a base64 URL fragment (an SPA route), not a
  # navigable page, so its `#...` links must not be fetched as standalone pages.
  '^https://play\.yaml\.com/#',
  # Auth-walled dashboard: 403s/redirects bots to login, so it is not link-checkable.
  '^https://chatgpt\.com/',
  # Loopback / preview hosts that appear in doc examples (boundary-anchored so it does
  # not also match hosts like localhost.example.com).
  '^https?://(localhost|127\.0\.0\.1|0\.0\.0\.0)([:/]|$)',
]
