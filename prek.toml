#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-case-conflict" },
  { id = "destroyed-symlinks" },
  { id = "check-illegal-windows-names" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-xml" },
  { id = "check-yaml" },
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "no-commit-to-branch" },
  {
    id = "pretty-format-json",
    args = ["--autofix"]
  },
  {
    id = "mixed-line-ending",
    args = ["--fix=lf"]
  }
]

[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.11.0.1"
hooks = [
  {
    id = "shellcheck",
    args = ["--severity=style"],
    files = '^scripts/.*\.sh$'
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "cargo-check",
    name = "cargo check",
    entry = "cargo check --workspace",
    language = "system",
    types = ["rust"],
    pass_filenames = false
  },
  {
    id = "cargo-fmt",
    name = "cargo fmt",
    entry = "cargo fmt --",
    language = "system",
    types = ["rust"],
    pass_filenames = false
  },
  {
    id = "clippy-fix",
    name = "cargo clippy --fix",
    entry = "cargo clippy --fix --allow-dirty --allow-staged",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    require_serial = true
  },
  {
    id = "clippy-enforce",
    name = "cargo clippy (enforce warnings)",
    entry = "cargo clippy --all-targets --all-features -- -D warnings",
    language = "system",
    types = ["rust"],
    pass_filenames = false,
    require_serial = true
  },
  {
    id = "publint",
    name = "publint",
    entry = "npx publint",
    language = "node",
    files = "package.json",
    pass_filenames = false
  },
  {
    id = "npm-package-json-lint",
    name = "npm-package-json-lint",
    entry = "npx npm-package-json-lint .",
    language = "node",
    files = "package.json",
    pass_filenames = false
  },
  {
    id = "uv audit",
    name = "uv audit",
    language = "system",
    entry = "uv audit --preview-features audit",
    always_run = true,
    pass_filenames = false
  },
  {
    id = "cargo-audit",
    name = "cargo audit",
    language = "system",
    entry = "cargo audit --deny warnings",
    always_run = true,
    pass_filenames = false
  },
  {
    id = "gen-llms-txt",
    name = "docs/llms.txt is current",
    language = "system",
    entry = "uv run scripts/gen_llms_txt.py --check",
    files = '^(zensical\.toml|docs/.*\.md|docs/llms(-full)?\.txt|scripts/gen_llms_txt\.py)$',
    pass_filenames = false
  },
  {
    # Comment-to-code ratio gate; needs `tokei` + `uv` on PATH (see AGENTS.md global
    # tools). Scoped to src .rs so it runs only when Rust source changes, but reads the
    # whole src tree (`pass_filenames = false`).
    id = "comment-ratio",
    name = "src comment-to-code ratio",
    language = "system",
    entry = "uv run scripts/source_size.py src --max-comment-ratio 0.10 --top 0",
    files = '^src/.*\.rs$',
    pass_filenames = false
  }
]

[[repos]]
repo = "https://github.com/owenlamont/lychee-pre-commit"
rev = "v0.24.2"
hooks = [
  {
    # Online link check via the lychee-pre-commit mirror: a language: python hook that
    # installs the prebuilt lychee-bin wheel, so no `lychee` on PATH is needed and it runs
    # the same on Windows, macOS, and Linux. `entry` is fixed to `lychee` by the hook, so
    # the args below replace its default `--no-progress`. The glob reaches lychee literally
    # (prek execs argv, no shell) and lychee expands it.
    id = "lychee",
    args = [
      "--include-fragments",
      "--no-progress",
      "docs",
      "README.md",
      "AGENTS.md",
      ".agents/skills/*/SKILL.md"
    ],
    always_run = true,
    pass_filenames = false
  }
]

[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.2.20"
hooks = [
  { id = "rumdl" }
]

[[repos]]
repo = "https://github.com/charliermarsh/ruff-pre-commit"
rev = "v0.15.18"
hooks = [
  {
    id = "ruff-check",
    args = [
      "--fix",
      "--exit-non-zero-on-fix",
      "--show-fixes"
    ],
    types_or = [
      "python",
      "pyi",
      "jupyter"
    ]
  },
  {
    id = "ruff-format",
    types_or = [
      "python",
      "pyi",
      "jupyter"
    ]
  }
]

[[repos]]
repo = "https://github.com/owenlamont/ryl-pre-commit"
rev = "v0.19.1"
hooks = [
  { id = "ryl", args = ["--fix"] },
  { id = "ryl-markdown", args = ["--fix"] }
]

[[repos]]
repo = "https://github.com/adhtruong/mirrors-typos"
rev = "v1.47.2"
hooks = [
  {
    id = "typos",
    args = ["--force-exclude"]
  }
]

[[repos]]
repo = "https://github.com/woodruffw/zizmor-pre-commit"
rev = "v1.26.1"
hooks = [
  {
    id = "zizmor",
    args = [
      "--min-severity",
      "low",
      "--min-confidence",
      "medium",
      "--fix=safe"
    ]
  }
]
